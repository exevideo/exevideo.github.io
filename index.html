<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UPD Progres 2.1%/100%</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Poppins', sans-serif;
}

body {
    height: 100vh;
    background: linear-gradient(-45deg, #0f0f1a, #111827, #1e1b4b, #0f172a);
    background-size: 400% 400%;
    animation: gradientBG 10s ease infinite;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    color: white;
}

@keyframes gradientBG {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
}

.container {
    text-align: center;
    padding: 40px;
    backdrop-filter: blur(10px);
    background: rgba(255,255,255,0.05);
    border-radius: 20px;
    border: 1px solid rgba(255,255,255,0.1);
    box-shadow: 0 0 40px rgba(0,0,0,0.5);
    animation: fadeIn 1.5s ease;
}

h1 {
    font-size: 60px;
    font-weight: 800;
    letter-spacing: 3px;
    background: linear-gradient(90deg, #00f5ff, #ff00c8);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    animation: glow 2s infinite alternate;
}

@keyframes glow {
    from { text-shadow: 0 0 10px rgba(0,245,255,0.6); }
    to { text-shadow: 0 0 25px rgba(255,0,200,0.8); }
}

.subtitle {
    margin-top: 10px;
    font-size: 18px;
    opacity: 0.8;
}

.desc {
    margin-top: 20px;
    font-size: 16px;
    opacity: 0.7;
}

.footer {
    margin-top: 30px;
    font-size: 14px;
    opacity: 0.6;
    letter-spacing: 2px;
}

@keyframes fadeIn {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
}

/* Floating particles */
.circle {
    position: absolute;
    border-radius: 50%;
    background: rgba(255,255,255,0.05);
    animation: float 10s linear infinite;
}

.circle:nth-child(1) {
    width: 200px;
    height: 200px;
    top: 10%;
    left: 20%;
}

.circle:nth-child(2) {
    width: 150px;
    height: 150px;
    bottom: 15%;
    right: 25%;
}

.circle:nth-child(3) {
    width: 100px;
    height: 100px;
    bottom: 30%;
    left: 40%;
}

@keyframes float {
    0% { transform: translateY(0px); }
    50% { transform: translateY(-30px); }
    100% { transform: translateY(0px); }
}
</style>
</head>
<body>

<div class="circle"></div>
<div class="circle"></div>
<div class="circle"></div>

<div class="container">
    <h1>MAINTENANCE</h1>
    <div class="subtitle">(from server)</div>
    <div class="desc">
        - Sedang ada perbaikan / pembaruan sistem
    </div>
    <div class="footer">
        *HexkyMod
    </div>
</div>

</body>
</html>
