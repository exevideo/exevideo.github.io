<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>ExeMusic Coin — 3D Animation</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Rajdhani:wght@300;400;600&display=swap" rel="stylesheet"/>
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --gold-bright: #FFE566;
    --gold-mid:    #FFC200;
    --gold-deep:   #C87800;
    --gold-dark:   #7A4800;
    --bg-deep:     #060200;
    --bg-mid:      #110800;
  }

  body {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--bg-deep);
    overflow: hidden;
    font-family: 'Rajdhani', sans-serif;
  }

  /* ── STARFIELD ── */
  .stars {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 0;
  }
  .star {
    position: absolute;
    border-radius: 50%;
    background: #fff;
    animation: twinkle var(--d, 3s) ease-in-out infinite;
    opacity: 0;
  }
  @keyframes twinkle {
    0%,100% { opacity: 0; transform: scale(0.6); }
    50%      { opacity: var(--op, 0.7); transform: scale(1); }
  }

  /* ── RADIAL AMBIENT ── */
  .ambient {
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 60% 45% at 50% 55%, rgba(200,120,0,0.18) 0%, transparent 70%),
      radial-gradient(ellipse 40% 30% at 50% 60%, rgba(255,180,0,0.10) 0%, transparent 60%);
    pointer-events: none;
    z-index: 0;
    animation: ambientPulse 4s ease-in-out infinite;
  }
  @keyframes ambientPulse {
    0%,100% { opacity: 0.7; }
    50%      { opacity: 1; }
  }

  /* ── SCENE ── */
  .scene {
    position: relative;
    z-index: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0;
  }

  /* ── TOP LABEL ── */
  .brand-top {
    font-family: 'Cinzel', serif;
    font-size: 11px;
    font-weight: 400;
    letter-spacing: 8px;
    color: rgba(255,200,60,0.45);
    text-transform: uppercase;
    margin-bottom: 36px;
    animation: fadeSlideDown 1.2s ease forwards;
  }
  @keyframes fadeSlideDown {
    from { opacity: 0; transform: translateY(-16px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* ── FLOAT WRAPPER ── */
  .float-wrap {
    animation: floatY 3.6s ease-in-out infinite;
  }
  @keyframes floatY {
    0%,100% { transform: translateY(0px); }
    50%      { transform: translateY(-22px); }
  }

  /* ── COIN PERSPECTIVE ── */
  .coin-perspective {
    perspective: 900px;
    perspective-origin: 50% 45%;
  }

  /* ── COIN ── */
  .coin {
    width: 300px;
    height: 300px;
    position: relative;
    transform-style: preserve-3d;
    animation: spin3d 6s linear infinite;
    filter:
      drop-shadow(0 0 30px rgba(255,180,0,0.6))
      drop-shadow(0 0 70px rgba(255,140,0,0.3))
      drop-shadow(0 12px 40px rgba(0,0,0,0.8));
  }
  @keyframes spin3d {
    from { transform: rotateY(0deg) rotateX(10deg); }
    to   { transform: rotateY(360deg) rotateX(10deg); }
  }

  /* ── COIN FACE ── */
  .coin-face {
    position: absolute;
    inset: 0;
    border-radius: 50%;
    overflow: hidden;
    backface-visibility: visible;
  }
  .coin-face img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
    border-radius: 50%;
  }

  /* ── SHINE OVERLAY (rotates opposite to coin for realism) ── */
  .shine-overlay {
    position: absolute;
    inset: 0;
    border-radius: 50%;
    pointer-events: none;
    animation: shineRotate 6s linear infinite;
    background: conic-gradient(
      from 0deg,
      transparent 0deg,
      rgba(255,255,220,0.0) 70deg,
      rgba(255,255,200,0.55) 90deg,
      rgba(255,255,255,0.70) 100deg,
      rgba(255,255,220,0.55) 110deg,
      rgba(255,255,220,0.0) 140deg,
      transparent 360deg
    );
    mix-blend-mode: screen;
  }
  @keyframes shineRotate {
    from { transform: rotateZ(0deg); }
    to   { transform: rotateZ(-360deg); }
  }

  /* ── EDGE RING ── */
  .edge-ring {
    position: absolute;
    inset: -4px;
    border-radius: 50%;
    border: 4px solid transparent;
    background:
      linear-gradient(#060200, #060200) padding-box,
      conic-gradient(
        #ffeb80 0deg,
        #c87800 45deg,
        #ffe566 90deg,
        #7a4800 135deg,
        #ffd700 180deg,
        #b86800 225deg,
        #ffe566 270deg,
        #c87800 315deg,
        #ffeb80 360deg
      ) border-box;
    animation: ringGlow 3s ease-in-out infinite;
    pointer-events: none;
  }
  @keyframes ringGlow {
    0%,100% { opacity: 0.7; }
    50%      { opacity: 1; box-shadow: 0 0 20px rgba(255,200,0,0.5); }
  }

  /* ── SHADOW ── */
  .coin-shadow {
    width: 240px;
    height: 24px;
    margin-top: 20px;
    background: radial-gradient(ellipse, rgba(180,90,0,0.50) 0%, transparent 75%);
    border-radius: 50%;
    animation: shadowSync 3.6s ease-in-out infinite;
    filter: blur(4px);
  }
  @keyframes shadowSync {
    0%,100% { transform: scaleX(1);   opacity: 0.5; }
    50%      { transform: scaleX(0.6); opacity: 0.2; }
  }

  /* ── PARTICLES ── */
  .particles {
    position: absolute;
    inset: 0;
    pointer-events: none;
    border-radius: 50%;
  }
  .p {
    position: absolute;
    border-radius: 50%;
    background: radial-gradient(circle, #ffe566 0%, #ffc200 60%, transparent 100%);
    animation: particleFly var(--dur) ease-out infinite var(--delay);
    width: var(--sz);
    height: var(--sz);
    left: var(--lx);
    top: var(--ly);
    opacity: 0;
  }
  @keyframes particleFly {
    0%   { transform: translate(0,0) scale(1); opacity: 0.9; }
    100% { transform: translate(var(--tx), var(--ty)) scale(0); opacity: 0; }
  }

  /* ── BOTTOM TEXT ── */
  .brand-bottom {
    margin-top: 34px;
    text-align: center;
    animation: fadeSlideUp 1.4s ease forwards;
  }
  @keyframes fadeSlideUp {
    from { opacity: 0; transform: translateY(20px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .brand-name {
    font-family: 'Cinzel', serif;
    font-size: 28px;
    font-weight: 900;
    letter-spacing: 6px;
    background: linear-gradient(135deg, #ffe566 0%, #ffc200 40%, #ffaa00 60%, #ffe566 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    filter: drop-shadow(0 0 12px rgba(255,180,0,0.6));
  }
  .brand-sub {
    margin-top: 6px;
    font-size: 11px;
    letter-spacing: 5px;
    color: rgba(255,190,60,0.45);
    text-transform: uppercase;
  }

  /* ── DIVIDER ── */
  .divider {
    width: 180px;
    height: 1px;
    margin: 20px auto;
    background: linear-gradient(to right, transparent, rgba(255,180,0,0.5), transparent);
  }

  /* ── CONTROLS ── */
  .controls {
    display: flex;
    gap: 10px;
    margin-top: 8px;
    animation: fadeSlideUp 1.6s ease forwards;
    opacity: 0;
    animation-fill-mode: forwards;
    animation-delay: 0.3s;
  }
  .ctrl-btn {
    background: rgba(255,180,0,0.07);
    border: 1px solid rgba(255,180,0,0.25);
    color: rgba(255,200,60,0.8);
    border-radius: 6px;
    padding: 8px 20px;
    font-size: 12px;
    letter-spacing: 2px;
    font-family: 'Rajdhani', sans-serif;
    font-weight: 600;
    text-transform: uppercase;
    cursor: pointer;
    transition: background 0.2s, border-color 0.2s, color 0.2s;
  }
  .ctrl-btn:hover {
    background: rgba(255,180,0,0.18);
    border-color: rgba(255,200,60,0.6);
    color: #ffe566;
  }
  .ctrl-btn.on {
    background: rgba(255,180,0,0.22);
    border-color: rgba(255,210,60,0.7);
    color: #ffeb80;
  }

  /* ── GLOW RING BEHIND COIN ── */
  .glow-behind {
    position: absolute;
    width: 320px;
    height: 320px;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    border-radius: 50%;
    background: radial-gradient(circle, rgba(255,160,0,0.18) 0%, transparent 70%);
    animation: glowPulse 3s ease-in-out infinite;
    pointer-events: none;
    z-index: -1;
  }
  @keyframes glowPulse {
    0%,100% { transform: translate(-50%,-50%) scale(1);   opacity: 0.8; }
    50%      { transform: translate(-50%,-50%) scale(1.15); opacity: 1; }
  }

  /* Speed modes */
  .coin.slow  { animation-duration: 12s; }
  .coin.fast  { animation-duration: 2s; }
  .coin.pause { animation-play-state: paused; }
  .float-wrap.pause { animation-play-state: paused; }
  .coin-shadow.pause { animation-play-state: paused; }
</style>
</head>
<body>

<!-- Stars -->
<div class="stars" id="stars"></div>
<div class="ambient"></div>

<div class="scene">
  <div class="brand-top">Global Music Brand &nbsp;·&nbsp; Est. 2024</div>

  <div class="float-wrap" id="floatWrap">
    <div style="position:relative;">
      <div class="glow-behind"></div>
      <div class="coin-perspective">
        <div class="coin" id="coin">
          <div class="coin-face">
            <img src="execoinicon.png" alt="ExeMusic Coin"/>
          </div>
          <div class="shine-overlay"></div>
          <!-- Particles -->
          <div class="particles">
            <div class="p" style="--lx:48%;--ly:10%;--sz:5px;--dur:2.2s;--delay:0s;--tx:-22px;--ty:-80px;"></div>
            <div class="p" style="--lx:50%;--ly:12%;--sz:4px;--dur:2.8s;--delay:0.4s;--tx:15px;--ty:-90px;"></div>
            <div class="p" style="--lx:30%;--ly:25%;--sz:6px;--dur:2.5s;--delay:0.8s;--tx:-35px;--ty:-75px;"></div>
            <div class="p" style="--lx:65%;--ly:20%;--sz:4px;--dur:2.0s;--delay:1.2s;--tx:30px;--ty:-85px;"></div>
            <div class="p" style="--lx:52%;--ly:8%;--sz:3px;--dur:3.1s;--delay:1.7s;--tx:8px;--ty:-100px;"></div>
            <div class="p" style="--lx:42%;--ly:15%;--sz:5px;--dur:2.4s;--delay:0.2s;--tx:-18px;--ty:-92px;"></div>
            <div class="p" style="--lx:58%;--ly:18%;--sz:3px;--dur:2.7s;--delay:2.1s;--tx:25px;--ty:-70px;"></div>
            <div class="p" style="--lx:35%;--ly:30%;--sz:4px;--dur:2.3s;--delay:0.6s;--tx:-40px;--ty:-60px;"></div>
          </div>
        </div>
      </div>
      <div class="edge-ring"></div>
    </div>
  </div>

  <div class="coin-shadow" id="coinShadow"></div>

  <div class="brand-bottom">
    <div class="brand-name">EXEMUSIC</div>
    <div class="divider"></div>
    <div class="brand-sub">Digital Audio &nbsp;·&nbsp; Sound Innovation</div>
  </div>

  <div class="controls" id="controls">
    <button class="ctrl-btn" id="btnPause" onclick="togglePause()">⏸ Pause</button>
    <button class="ctrl-btn" id="btnSlow"  onclick="setSpeed('slow')">Slow</button>
    <button class="ctrl-btn" id="btnNorm"  onclick="setSpeed('normal')" style="border-color:rgba(255,210,60,0.6);color:#ffe566;">Normal</button>
    <button class="ctrl-btn" id="btnFast"  onclick="setSpeed('fast')">Fast</button>
  </div>
</div>

<script>
  /* ── Stars ── */
  const starsEl = document.getElementById('stars');
  for (let i = 0; i < 120; i++) {
    const s = document.createElement('div');
    s.className = 'star';
    const sz = Math.random() * 2.5 + 0.5;
    s.style.cssText = `
      left:${Math.random()*100}%;
      top:${Math.random()*100}%;
      width:${sz}px; height:${sz}px;
      --d:${(Math.random()*4+2).toFixed(1)}s;
      --op:${(Math.random()*0.5+0.2).toFixed(2)};
      animation-delay:${(Math.random()*5).toFixed(1)}s;
    `;
    starsEl.appendChild(s);
  }

  /* ── Controls ── */
  const coin       = document.getElementById('coin');
  const floatWrap  = document.getElementById('floatWrap');
  const coinShadow = document.getElementById('coinShadow');
  const btnPause   = document.getElementById('btnPause');
  let paused = false;

  function togglePause() {
    paused = !paused;
    [coin, floatWrap, coinShadow].forEach(el => {
      el.style.animationPlayState = paused ? 'paused' : 'running';
    });
    btnPause.textContent = paused ? '▶ Play' : '⏸ Pause';
    btnPause.classList.toggle('on', paused);
  }

  function setSpeed(s) {
    const map = { slow: '12s', normal: '6s', fast: '2s' };
    coin.style.animationDuration = map[s];
    ['btnSlow','btnNorm','btnFast'].forEach(id => {
      document.getElementById(id).classList.remove('on');
    });
    document.getElementById('btn' + s.charAt(0).toUpperCase() + s.slice(1)).classList.add('on');
  }
</script>
</body>
</html>
